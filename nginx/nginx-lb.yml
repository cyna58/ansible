---
- name: Install nginx on all hosts
  hosts: all
  become: yes
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: latest
        update_cache: yes
    
    - name: Add user to sudo group
      user:
        name: cyna
        groups: sudo
        state: present

    - name: Remove default nginx configuration
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

- name: Configure backend servers
  hosts: backend
  become: yes
  tasks:
    - name: Create web root directories
      file:
        path: "{{ websites[inventory_hostname].root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy index.html files
      copy:
        src: "/home/cyna/ansible/{{ websites[inventory_hostname].index }}"
        dest: "{{ websites[inventory_hostname].root }}/index.html"
        owner: www-data
        group: www-data
        mode: '0644'
      loop: "{{ websites.values() }}"

    - name: Deploy nginx site-config from template
      template:
        src: site-config.j2
        dest: /etc/nginx/sites-available/site-config
      vars:
        web_root: "{{ websites[inventory_hostname].root }}"
      notify: Validate nginx config

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/site-config
        dest: /etc/nginx/sites-enabled/site-config
        state: link

  handlers:
    - name: Validate nginx config
      command: nginx -t
      notify: Reload nginx

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded      

- name: Configure load balancer
  hosts: loadbalancer
  become: yes
  tasks:
    - name: Deploy nginx loadbalancer config
      template:
        src: loadbalancer.j2
        dest: /etc/nginx/sites-available/loadbalancer
      notify: Validate nginx config

    - name: Enable loadbalancer site
      file:
        src: /etc/nginx/sites-available/loadbalancer
        dest: /etc/nginx/sites-enabled/loadbalancer
        state: link
  
  handlers:
    - name: Validate nginx config
      command: nginx -t
      notify: Reload nginx

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
